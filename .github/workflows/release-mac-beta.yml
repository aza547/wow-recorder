name: Release Mac (beta)

# Triggers on beta tags pushed to the fork. Examples:
#   git tag v7.7.0-beta.1
#   git push origin v7.7.0-beta.1
#
# Guards: only runs on the fork, never on upstream. Remove the
# `repository` check if/when upstream adopts this workflow.
#
# Secrets required (Settings → Secrets → Actions on the fork):
#   MAC_CERT_P12_BASE64    base64 of "Developer ID Application" .p12 export
#   MAC_CERT_PASSWORD      passphrase for the .p12
# Optional (enables notarization — without these, builds are signed
# but unnotarized, so end-users must right-click → Open the first time):
#   APPLE_API_KEY_BASE64   base64 of AuthKey_<id>.p8 from App Store Connect
#   APPLE_API_KEY_ID       key id (e.g. ABCD1234EF)
#   APPLE_API_ISSUER       issuer uuid

on:
  push:
    tags:
      - 'v*-beta*'
      - 'v*-beta.*'

jobs:
  build:
    if: github.repository == 'yuripiratello/wow-recorder'
    runs-on: macos-14
    timeout-minutes: 60

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22.12.0'
          cache: 'npm'

      - name: Import Developer ID signing cert
        env:
          P12_BASE64: ${{ secrets.MAC_CERT_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ github.run_id }}
        run: |
          set -euo pipefail
          echo "$P12_BASE64" | base64 --decode > /tmp/cert.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import /tmp/cert.p12 \
            -k build.keychain \
            -P "$P12_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" build.keychain
          security find-identity -v -p codesigning build.keychain
          rm -f /tmp/cert.p12

      - name: Write App Store Connect API key
        id: apikey
        env:
          KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
        run: |
          set -euo pipefail
          if [ -z "${KEY_BASE64:-}" ]; then
            echo "[apikey] APPLE_API_KEY_BASE64 not set — notarization disabled."
            echo "path=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          mkdir -p "$HOME/private_keys"
          P8="$HOME/private_keys/AuthKey_${KEY_ID}.p8"
          echo "$KEY_BASE64" | base64 --decode > "$P8"
          echo "path=$P8" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: npm ci

      - name: Clean dist
        run: npx ts-node ./.erb/scripts/clean.js dist

      - name: Build main + renderer
        run: npm run build

      - name: Build DLL bundle (used by main process)
        run: npm run build:dll

      - name: Package and publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # When APPLE_API_KEY_BASE64 secret is unset the apikey step is
          # skipped, so steps.apikey.outputs.path is empty and electron-
          # builder silently skips notarization. Provide the values
          # unconditionally — empty env is treated as absent.
          APPLE_API_KEY: ${{ steps.apikey.outputs.path }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          set -euo pipefail
          npx electron-builder \
            --mac \
            --arm64 \
            --publish always

      - name: Cleanup
        if: always()
        run: |
          security delete-keychain build.keychain || true
          rm -f "$HOME/private_keys/"*.p8 || true
