# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Warcraft Recorder CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:  # Allows manual triggering from github UI

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout noobs
      uses: actions/checkout@v6
      with:
        repository: sepdotgg/noobs
        ref: linux-pr-wip
        path: noobs

    - name: Checkout wow-recorder
      uses: actions/checkout@v6
      with:
        path: wow-recorder

    - name: Setup Node JS
      uses: actions/setup-node@v6
      with:
        node-version: 24
        cache: 'npm'
        cache-dependency-path: wow-recorder/package-lock.json

    - name: Build noobs
      working-directory: noobs
      run: |
        npm install
        npm run build

    - name: Install deps
      working-directory: wow-recorder
      run: npm install

    - name: Build Windows package
      working-directory: wow-recorder
      run: |
        node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('package.json'));p.build.win.signtoolOptions=null;fs.writeFileSync('package.json',JSON.stringify(p,null,2))"
        npm run package

    # https://github.com/aza547/wow-recorder/issues/737
    # - name: Run unit tests
    #   working-directory: wow-recorder
    #   run: npm test

    - name: Upload Windows artifact
      uses: actions/upload-artifact@v4
      with:
        name: windows-installer
        path: |
          wow-recorder/release/build/WarcraftRecorder-Setup-*.exe
          wow-recorder/release/build/latest.yml
        retention-days: 30

    - name: Get public download link
      run: |
        echo "Public download link:"
        echo "https://nightly.link/${{ github.repository }}/actions/runs/${{ github.run_id }}/windows-installer.zip"

  build-linux:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout noobs
      uses: actions/checkout@v6
      with:
        repository: sepdotgg/noobs
        ref: linux-pr-wip
        path: noobs

    - name: Checkout wow-recorder
      uses: actions/checkout@v6
      with:
        path: wow-recorder

    - name: Setup Node JS
      uses: actions/setup-node@v6
      with:
        node-version: 24
        cache: 'npm'
        cache-dependency-path: wow-recorder/package-lock.json

    - name: Build noobs
      working-directory: noobs
      run: |
        npm install
        npm run build

    - name: Install deps
      working-directory: wow-recorder
      run: npm install

    - name: Build Linux package
      working-directory: wow-recorder
      run: npm run package

    - name: Upload Linux artifact
      uses: actions/upload-artifact@v4
      with:
        name: linux-appimage
        path: |
          wow-recorder/release/build/*.AppImage
          wow-recorder/release/build/latest-linux.yml
        retention-days: 30

    - name: Get public download link
      run: |
        echo "Public download link:"
        echo "https://nightly.link/${{ github.repository }}/actions/runs/${{ github.run_id }}/linux-appimage.zip"
